<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bimal Bakery - Swiggy Style UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0c10;
--card:#161823;
--accent:#ffb347;
--muted:#a9a9a9;
--white:#fff;
--green:#00d084;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Poppins,sans-serif;
background:var(--bg);
color:var(--white);
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(10,10,15,0.7);
backdrop-filter:blur(12px);
padding:14px 8%;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-weight:600;
color:var(--accent);
letter-spacing:1px;
}

.search{
flex:1;
margin:0 20px;
}

.search input{
width:100%;
padding:10px 14px;
border-radius:12px;
border:none;
outline:none;
background:#1b1d2a;
color:#fff;
}

.cart{
background:var(--accent);
color:#111;
padding:8px 14px;
border-radius:20px;
font-weight:600;
cursor:pointer;
}

/* HERO */
.hero{
padding:30px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.hero h1{
font-size:28px;
}

.hero p{
color:var(--muted);
font-size:13px;
}

/* CATEGORY */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 8%;
}

.cat{
padding:8px 14px;
border-radius:20px;
background:#1a1c28;
white-space:nowrap;
font-size:12px;
cursor:pointer;
}

.cat:hover{background:var(--accent);color:#111}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
padding:20px 8%;
}

.card{
background:var(--card);
border-radius:16px;
overflow:hidden;
transition:0.3s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{transform:translateY(-5px)}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.card h3{
font-size:14px;
}

.price{
color:var(--accent);
font-weight:600;
margin-top:5px;
}

.btn{
margin-top:8px;
display:inline-block;
background:var(--accent);
color:#111;
padding:6px 10px;
border-radius:12px;
font-size:12px;
cursor:pointer;
}

/* CART BAR */
.bottom-cart{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#11131c;
padding:12px 8%;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid rgba(255,255,255,0.05);
}

.total{
font-weight:600;
}

.checkout{
background:var(--green);
color:#111;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-weight:600;
}
</style>
</head>

<body>

<header>
<div class="logo">BIMAL BAKERY</div>

<div class="search">
<input placeholder="Search cakes, pastries, bread...">
</div>

<div class="cart">Cart (0)</div>
</header>

<div class="hero">
<div>
<h1>Order Fresh Bakery Items</h1>
<p>Inspired by Swiggy/Zomato UI — fast, modern bakery ordering experience.</p>
</div>
</div>

<div class="categories">
<div class="cat">All</div>
<div class="cat">Cakes</div>
<div class="cat">Pastries</div>
<div class="cat">Bread</div>
<div class="cat">Cookies</div>
</div>

<div class="grid">

<div class="card">
<img src="https://placehold.co/400x300?text=Chocolate+Cake">
<div class="card-content">
<h3>Chocolate Cake</h3>
<div class="price">₹499</div>
<div class="btn">Add</div>
</div>
</div>

<div class="card">
<img src="https://placehold.co/400x300?text=Red+Velvet">
<div class="card-content">
<h3>Red Velvet</h3>
<div class="price">₹599</div>
<div class="btn">Add</div>
</div>
</div>

<div class="card">
<img src="https://placehold.co/400x300?text=Bread">
<div class="card-content">
<h3>Fresh Bread</h3>
<div class="price">₹40</div>
<div class="btn">Add</div>
</div>
</div>

<div class="card">
<img src="https://placehold.co/400x300?text=Cookies">
<div class="card-content">
<h3>Cookies Pack</h3>
<div class="price">₹120</div>
<div class="btn">Add</div>
</div>
</div>

</div>

<div class="bottom-cart">
<div class="total">Total: ₹0</div>
<div class="checkout">Checkout</div>
</div>

<script>
let cartCount=0;
let total=0;

document.querySelectorAll(".btn").forEach(btn=>{
btn.addEventListener("click",()=>{
cartCount++;
total += parseInt(btn.parentElement.querySelector(".price").innerText.replace("₹",""));
document.querySelector(".cart").innerText=`Cart (${cartCount})`;
document.querySelector(".total").innerText=`Total: ₹${total}`;
});
});
</script>

</body>
</html>
